# CI Runner Farm - default configuration
# Copied to /boot/config/plugins/ci-runner-farm/config.cfg on first install.
# The GitHub PAT is stored separately in .../ci-runner-farm/token (chmod 600).
# A private-registry password/token (for pulling a private IMAGE) is stored in
# .../ci-runner-farm/registry-token (chmod 600).

GH_SCOPE="repo"
GH_OWNER="unraid"
GH_REPOS="unraid/repo-a unraid/repo-b"
RUNNER_GROUP=""
RUNNER_COUNT="4"
RUNNER_LABELS="self-hosted,unraid,build"
RUNNER_CPUS=""
RUNNER_MEMORY="16g"
CACHE_ROOT="/mnt/user/github-runner"
WORK_TMPFS_SIZE="8g"
IMAGE_SOURCE="builtin"
IMAGE=""
EPHEMERAL="false"
REGISTRY_SERVER=""
REGISTRY_USERNAME=""
CACHE_MOUNTS="pnpm-store:/root/.local/share/pnpm/store npm:/root/.npm yarn:/usr/local/share/.cache/yarn ms-playwright:/root/.cache/ms-playwright"
SHARE_DOCKER_SOCK="true"
DIND="true"
SHARED_IMAGE_CACHE="true"
AUTOSCALE="false"
AUTOSCALE_MIN="2"
AUTOSCALE_MAX="16"
AUTOSCALE_MIN_IDLE="2"
AUTOSCALE_STEP="2"
AUTOSCALE_INTERVAL="30"
AUTOSCALE_IDLE_GRACE="5"
