# CI Runner Farm - default configuration
# Copied to /boot/config/plugins/ci-runner-farm/config.cfg on first install.
# The GitHub PAT is stored separately in .../ci-runner-farm/token (chmod 600).

GH_SCOPE="repo"
GH_OWNER="unraid"
GH_REPOS="unraid/repo-a unraid/repo-b"
RUNNER_GROUP=""
RUNNER_COUNT="4"
RUNNER_LABELS="self-hosted,unraid,build"
RUNNER_CPUS=""
RUNNER_MEMORY="16g"
CACHE_ROOT="/mnt/github-runner"
WORK_TMPFS_SIZE="8g"
IMAGE="ci-runner-farm-runner:latest"
EPHEMERAL="false"
SHARE_DOCKER_SOCK="true"
DIND="true"
