name: Build Plugin

# PR / branch CI: build the self-contained .plg from src/, validate the XML,
# and confirm the embedded payload matches the source tree. Publishing happens
# separately via release-please (.github/workflows/release-please.yml), which
# regenerates the .plg on the release PR and uploads it as a GitHub Release
# asset that Community Applications installs from.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build and validate plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Build .plg from src/
        env:
          REPO: ${{ github.repository }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          chmod +x build-plg.sh
          ./build-plg.sh

      - name: Validate .plg XML, package MD5, and package contents
        run: |
          set -euo pipefail
          plg="ci-runner-farm.plg"
          tgz="ci-runner-farm.tgz"
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('$plg')"

          # The .plg carries the package's MD5 as the packageMD5 ENTITY (Unraid
          # expands it into <MD5>); it must match the .tgz build-plg.sh produced.
          plg_md5="$(sed -n 's/^<!ENTITY packageMD5[[:space:]]*"\([0-9a-f]*\)">$/\1/p' "$plg")"
          tgz_md5="$(md5sum "$tgz" | cut -d' ' -f1)"
          if [[ -z "$plg_md5" || "$plg_md5" != "$tgz_md5" ]]; then
            echo "packageMD5 in $plg ($plg_md5) does not match $tgz ($tgz_md5)" >&2
            exit 1
          fi

          # And the package must contain exactly the source plugin tree.
          rm -rf /tmp/plgtree && mkdir -p /tmp/plgtree
          tar -xzf "$tgz" -C /tmp/plgtree
          diff -r /tmp/plgtree src/usr/local/emhttp/plugins/ci-runner-farm
          echo "Plugin built and validated (package md5 $tgz_md5)."

      - name: Upload built .plg + .tgz (CI artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-runner-farm-plg
          path: |
            ci-runner-farm.plg
            ci-runner-farm.tgz
          if-no-files-found: error
