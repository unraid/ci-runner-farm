name: Build Plugin

# PR / branch CI: build the self-contained .plg from src/, validate the XML,
# and confirm the embedded payload matches the source tree. Publishing happens
# separately via release-please (.github/workflows/release-please.yml), which
# regenerates the .plg on the release PR and uploads it as a GitHub Release
# asset that Community Applications installs from.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build and validate plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Build .plg from src/
        env:
          REPO: ${{ github.repository }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          chmod +x build-plg.sh
          ./build-plg.sh

      - name: Validate .plg XML and embedded payload
        run: |
          set -euo pipefail
          plg="ci-runner-farm.plg"
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('$plg')"
          python3 - "$plg" > /tmp/payload.b64 <<'PY'
          import re, sys
          m = re.search(r'payload\.b64.*?<!\[CDATA\[(.*?)\]\]>', open(sys.argv[1]).read(), re.S)
          if not m:
              sys.exit("payload.b64 CDATA block not found in PLG")
          sys.stdout.write(m.group(1).strip())
          PY
          rm -rf /tmp/plgtree && mkdir -p /tmp/plgtree
          base64 -d /tmp/payload.b64 | tar -xz -C /tmp/plgtree
          diff -r /tmp/plgtree src/usr/local/emhttp/plugins/ci-runner-farm
          echo "Plugin built and validated."

      - name: Upload built .plg (CI artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-runner-farm-plg
          path: ci-runner-farm.plg
          if-no-files-found: error
