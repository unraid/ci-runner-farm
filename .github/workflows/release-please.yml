name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.release.outputs.pr || '' }}
      release_created: ${{ steps.release.outputs.release_created || 'false' }}
      tag_name: ${{ steps.release.outputs.tag_name || '' }}
    steps:
      - id: release
        name: Release Please
        uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5
        with:
          token: ${{ secrets.UNRAID_BOT_GITHUB_ADMIN_TOKEN || github.token }}

  # On the open release PR, regenerate the self-contained .plg so its version
  # entities and embedded payload match the version release-please just bumped,
  # then commit it back onto the PR branch.
  prepare-plugin-release-pr:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release PR
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
          token: ${{ secrets.UNRAID_BOT_GITHUB_ADMIN_TOKEN || github.token }}
          fetch-depth: 0

      - name: Prepare plugin release metadata
        shell: bash
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="$(python3 -c 'import json;print(json.load(open(".release-please-manifest.json"))["."])')"
          printf '%s\n' "$version" > VERSION
          chmod +x build-plg.sh
          INTERNAL_VERSION="$version" ./build-plg.sh

      - name: Commit plugin release metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Plugin release metadata is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION ci-runner-farm.plg
          git commit -m "chore(release): prepare plugin metadata"
          git push origin HEAD:${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}

  validate-plugin-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}

  # When the release PR merges and release-please cuts the tag + GitHub Release,
  # attach the tagged .plg as the release asset that CA / Unraid installs from.
  publish-plugin-release:
    needs:
      - release-please
      - validate-plugin-release
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Upload plugin release artifact
        env:
          GH_TOKEN: ${{ secrets.UNRAID_BOT_GITHUB_ADMIN_TOKEN || github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          # Rebuild the package reproducibly from the tagged src; its MD5 matches
          # the packageMD5 the committed .plg already advertises. Upload it under
          # the version-pinned asset name the .plg's packageName entity expects.
          chmod +x build-plg.sh
          ./build-plg.sh --tgz-only
          asset="$(sed -n 's/^<!ENTITY packageName[[:space:]]*"\([^"]*\)">$/\1/p' ci-runner-farm.plg)"
          [[ -n "$asset" ]] || { echo "::error::packageName entity missing in .plg" >&2; exit 1; }
          plg_md5="$(sed -n 's/^<!ENTITY packageMD5[[:space:]]*"\([0-9a-f]*\)">$/\1/p' ci-runner-farm.plg)"
          tgz_md5="$(md5sum ci-runner-farm.tgz | cut -d' ' -f1)"
          [[ "$plg_md5" == "$tgz_md5" ]] || { echo "::error::rebuilt package md5 ($tgz_md5) != committed .plg packageMD5 ($plg_md5)" >&2; exit 1; }
          cp ci-runner-farm.tgz "$asset"
          gh release upload "$RELEASE_TAG" ci-runner-farm.plg "$asset" --clobber

  # Also publish the tagged .plg to the private Cloudflare R2 "preview" bucket, so
  # the plugin can be installed from a non-public URL while the repo stays private
  # (Unraid only needs to fetch the single .plg). Uses the org's private-repo R2
  # credentials (CLOUDFLARE_PREVIEW_*), which are explicitly shared with the
  # public repositories that publish to the preview bucket.
  #
  # The uploaded copy's pluginURL is rewritten to its own stable R2 URL so Unraid's
  # "check for updates" resolves from R2 (works while the repo is private) instead
  # of the private GitHub release asset. The GitHub-release .plg is left untouched.
  publish-plugin-r2:
    needs:
      - release-please
      - validate-plugin-release
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Publish .plg to Cloudflare R2 (preview bucket)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_PREVIEW_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_PREVIEW_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.CLOUDFLARE_S3_URL }}
          R2_BUCKET: ${{ secrets.CLOUDFLARE_PREVIEW_BUCKET_NAME }}
          R2_BASE_URL: ${{ secrets.CLOUDFLARE_PREVIEW_BUCKET_BASE_URL }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          # Per-plugin object prefix in the bucket. The install URL is
          # "$R2_BASE_URL/$KEY_PREFIX/ci-runner-farm.plg"; change here to relocate.
          KEY_PREFIX: plugins/ci-runner-farm
        shell: bash
        run: |
          set -euo pipefail
          plg="ci-runner-farm.plg"
          tgz="ci-runner-farm.tgz"
          [[ -f "$plg" ]] || { echo "::error::$plg missing at tag $RELEASE_TAG" >&2; exit 1; }
          # Rebuild the package reproducibly (matches the committed .plg's MD5).
          chmod +x build-plg.sh
          ./build-plg.sh --tgz-only
          plg_md5="$(sed -n 's/^<!ENTITY packageMD5[[:space:]]*"\([0-9a-f]*\)">$/\1/p' "$plg")"
          tgz_md5="$(md5sum "$tgz" | cut -d' ' -f1)"
          [[ "$plg_md5" == "$tgz_md5" ]] || { echo "::error::rebuilt package md5 ($tgz_md5) != committed .plg packageMD5 ($plg_md5)" >&2; exit 1; }
          : "${AWS_ACCESS_KEY_ID:?CLOUDFLARE_PREVIEW_ACCESS_KEY_ID not set}"
          : "${AWS_SECRET_ACCESS_KEY:?CLOUDFLARE_PREVIEW_SECRET_ACCESS_KEY not set}"
          : "${R2_ENDPOINT:?CLOUDFLARE_S3_URL not set}"
          : "${R2_BUCKET:?CLOUDFLARE_PREVIEW_BUCKET_NAME not set}"
          : "${R2_BASE_URL:?CLOUDFLARE_PREVIEW_BUCKET_BASE_URL not set}"

          version="${RELEASE_TAG#v}"
          base="${R2_BASE_URL%/}"
          stable_key="$KEY_PREFIX/ci-runner-farm.plg"
          versioned_key="$KEY_PREFIX/ci-runner-farm-$version.plg"
          stable_url="$base/$stable_key"

          # The package keeps its version-pinned filename (packageName ENTITY) in
          # R2 too, so the same immutable object is addressable per release.
          package_name="$(sed -n 's/^<!ENTITY packageName[[:space:]]*"\([^"]*\)">$/\1/p' "$plg")"
          [[ -n "$package_name" ]] || { echo "::error::packageName entity missing in .plg" >&2; exit 1; }
          tgz_key="$KEY_PREFIX/$package_name"
          tgz_url="$base/$tgz_key"

          # Point the R2 copy's URLs at their own R2 locations. Rewrite the
          # pluginURL ENTITY (update-check target) AND the packageURL ENTITY (the
          # .tgz this .plg downloads); the packageMD5 is unchanged (same bytes).
          # Then re-validate the XML still parses.
          sed -i -E "s#(<!ENTITY pluginURL[[:space:]]+\").*(\">)#\1${stable_url}\2#" "$plg"
          sed -i -E "s#(<!ENTITY packageURL[[:space:]]+\").*(\">)#\1${tgz_url}\2#" "$plg"
          grep -q "$stable_url" "$plg" || { echo "::error::pluginURL rewrite failed" >&2; exit 1; }
          grep -q "$tgz_url" "$plg"    || { echo "::error::packageURL rewrite failed" >&2; exit 1; }
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('$plg')"

          # Upload the package (immutable, per-version) so the rewritten packageURL
          # resolves in R2. The .plg still verifies it by the unchanged MD5.
          echo "uploading s3://$R2_BUCKET/$tgz_key"
          aws s3 cp "$tgz" "s3://$R2_BUCKET/$tgz_key" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/gzip \
            --cache-control "public, max-age=31536000, immutable"

          # Upload a stable "latest" key (what installs/updates point at) and an
          # immutable per-version copy for rollback/archival.
          for key in "$stable_key" "$versioned_key"; do
            echo "uploading s3://$R2_BUCKET/$key"
            aws s3 cp "$plg" "s3://$R2_BUCKET/$key" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type application/xml \
              --cache-control "no-cache, max-age=0"
          done

          {
            echo "### Published .plg to Cloudflare R2 (preview bucket)"
            echo ""
            echo "Install / update URL (private-friendly):"
            echo ""
            echo '```'
            echo "$stable_url"
            echo '```'
            echo "- Versioned copy: \`$base/$versioned_key\`"
            echo "- Package: \`$tgz_url\`"
          } >> "$GITHUB_STEP_SUMMARY"
